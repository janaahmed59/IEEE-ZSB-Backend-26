<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta name = "description" content="frontend Skeleton" />
        <title>Uni Core</title>
    </head>
    <body>
       <h1>Student Registration</h1>
       <form action="dashboard.html" method="get">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name = "fullname" required>
            <br><br>
            <label for="email"> Email:</label>
            <input type="email" id="email" name = "email" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name = "password" required>
            <br><br>
            <label for="dob">Date Of Birth:</label>
            <input type="dob" id="dob" name = "dob" required>
            <br><br>

            <label for="department">Department:</label>
            <select type="department" id="department" name = "department" required>
                <option value="CS">Computer Science </option>
                <option value="IT">Information Technology </option>
                <option value="IS">Information System</option>
            </select>
            <br><br>

            <label>Gender:</label>
            <input type="ratio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>            
            
            <input type="ratio" id="female" name="gender" value="Female" required>
            <label for="female">Female</label>         
            <br><br>

            <button type="submit">Register</button>       
       </form>
 
    </body>
</html>
